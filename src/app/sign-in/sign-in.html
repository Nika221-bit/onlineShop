<form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
  <div class="field">
    <label for="signin-email">Email</label>
    <input
      id="signin-email"
      type="email"
      formControlName="email"
      autocomplete="email"
      placeholder="you@example.com"
    />
    <span class="hint" *ngIf="form.controls.email.touched && form.controls.email.invalid">
      Enter a valid email address.
    </span>
  </div>

  <div class="field">
    <label for="signin-password">Password</label>
    <input
      id="signin-password"
      type="password"
      formControlName="password"
      autocomplete="current-password"
      placeholder="Your password"
    />
    <span class="hint" *ngIf="form.controls.password.touched && form.controls.password.invalid">
      Password must be at least 6 characters.
    </span>
  </div>

  <p class="message success" *ngIf="successMessage">{{ successMessage }}</p>
  <p class="message error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <button type="submit" [disabled]="loading">
    {{ loading ? 'Signing in...' : 'Sign in' }}
  </button>

  <p class="auth-switch">
    Do not have an account?
    <a routerLink="/sign-up">Create account</a>
  </p>
</form>
