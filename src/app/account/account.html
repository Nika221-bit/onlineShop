<section class="auth-page">
  <div class="tabs">
    <button
      type="button"
      class="tab-button"
      [class.active]="activeTab === 'signIn'"
      (click)="switchTab('signIn')"
    >
      Login
    </button>
    <button
      type="button"
      class="tab-button"
      [class.active]="activeTab === 'signUp'"
      (click)="switchTab('signUp')"
    >
      Register
    </button>
  </div>

  <div *ngIf="successMessage" class="message success">{{ successMessage }}</div>
  <div *ngIf="errorMessage" class="message error">{{ errorMessage }}</div>

  <div class="card">
    <div *ngIf="activeTab === 'signIn'">
      <form (ngSubmit)="submitSignIn()">
        <h2>Sign in to your account</h2>

        <label for="signInEmail">Email</label>
        <input
          id="signInEmail"
          type="email"
          [(ngModel)]="signInModel.email"
          name="signInEmail"
          required
        />

        <label for="signInPassword">Password</label>
        <input
          id="signInPassword"
          type="password"
          [(ngModel)]="signInModel.password"
          name="signInPassword"
          required
        />

        <button type="submit" [disabled]="loading">{{ loading ? 'Signing in...' : 'Sign In' }}</button>
      </form>
    </div>

    <div *ngIf="activeTab === 'signUp'">
      <form (ngSubmit)="submitSignUp()">
        <h2>Create a new account</h2>

        <label for="signUpName">Full name</label>
        <input
          id="signUpName"
          type="text"
          [(ngModel)]="signUpModel.fullName"
          name="signUpName"
          required
        />

        <label for="signUpEmail">Email</label>
        <input
          id="signUpEmail"
          type="email"
          [(ngModel)]="signUpModel.email"
          name="signUpEmail"
          required
        />

        <label for="signUpPassword">Password</label>
        <input
          id="signUpPassword"
          type="password"
          [(ngModel)]="signUpModel.password"
          name="signUpPassword"
          required
        />

        <button type="submit" [disabled]="loading">{{ loading ? 'Registering...' : 'Register' }}</button>
      </form>
    </div>
  </div>
</section>
